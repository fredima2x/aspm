name: Build & Release ASPM


on:
  workflow_dispatch:  # Manuell auslösbar
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: fredima2x/aspm/client   # ← Alle Schritte laufen hier

jobs:

  # ─── Linux Build ────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installieren
        run: pip install pyinstaller PyQt5

      - name: Bauen
        run: |
          pyinstaller --onedir --windowed \
            --name="aspm" \
            --add-data="assets/*.ui:assets" \
            --hidden-import=PyQt5.sip \
            --hidden-import=PyQt5.uic \
            main.py

      - name: Zip erstellen
        run: zip -r aspm-linux.zip dist/aspm/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: fredima2x/aspm/client/aspm-linux.zip

  # ─── macOS Build ────────────────────────────────────────
  build-mac:
      runs-on: macos-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Installieren
          run: |
            pip install pyinstaller PyQt5
            brew install create-dmg

        - name: Icon erstellen (.icns)       # ← NEU
          run: |
            mkdir app.iconset
            sips -z 16 16     assets/logo.png --out app.iconset/icon_16x16.png
            sips -z 32 32     assets/logo.png --out app.iconset/icon_16x16@2x.png
            sips -z 32 32     assets/logo.png --out app.iconset/icon_32x32.png
            sips -z 64 64     assets/logo.png --out app.iconset/icon_32x32@2x.png
            sips -z 128 128   assets/logo.png --out app.iconset/icon_128x128.png
            sips -z 256 256   assets/logo.png --out app.iconset/icon_128x128@2x.png
            sips -z 256 256   assets/logo.png --out app.iconset/icon_256x256.png
            sips -z 512 512   assets/logo.png --out app.iconset/icon_256x256@2x.png
            sips -z 512 512   assets/logo.png --out app.iconset/icon_512x512.png
            iconutil -c icns app.iconset -o app.icns
          working-directory: fredima2x/aspm/client

        - name: Bauen
          run: |
            pyinstaller --onedir --windowed \
              --name="aspm" \
              --icon=app.icns \
              --add-data="assets/*.ui:assets" \
              --hidden-import=PyQt5.sip \
              --hidden-import=PyQt5.uic \
              --osx-bundle-identifier=com.fredima.aspm \
              main.py

  # ─── Windows Build ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installieren
        run: pip install pyinstaller PyQt5

      - name: Bauen
        run: |
          pyinstaller --onedir --windowed `
            --name="aspm" `
            --add-data="assets/*.ui;assets" `
            --hidden-import=PyQt5.sip `
            --hidden-import=PyQt5.uic `
            main.py

      - name: Inno Setup installieren & Installer bauen
        run: |
          choco install innosetup -y
          iscc installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: fredima2x/aspm/client/installer_output/*.exe

  # ─── GitHub Release ─────────────────────────────────────
  release:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Release erstellen
        uses: softprops/action-gh-release@v1
        with:
          files: |
            linux-build/aspm-linux.zip
            mac-dmg/aspm.dmg
            windows-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}