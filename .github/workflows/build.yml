name: Build, Release & Pages ASPM

on:
  push:
    tags:
      - 'v*'  # Nur Tags lösen Builds & Release aus
  workflow_dispatch:  # Manuell starten, aber ohne Release/Pages

defaults:
  run:
    working-directory: client

jobs:

  # ─── Linux Build ────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Abhängigkeiten installieren
        run: pip install pyinstaller PyQt5
      - name: Build erstellen
        run: |
          pyinstaller --onedir --windowed \
            --name="aspm" \
            --add-data="assets/*.ui:assets" \
            --hidden-import=PyQt5.sip \
            --hidden-import=PyQt5.uic \
            main.py
      - name: ZIP erstellen
        run: zip -r aspm-linux.zip dist/aspm/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: client/aspm-linux.zip

  # ─── macOS Build ────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Abhängigkeiten installieren
        run: |
          pip install pyinstaller PyQt5
          brew install create-dmg
      - name: Icon erstellen (.icns)
        run: |
          mkdir app.iconset
          sips -z 16 16     assets/logo.png --out app.iconset/icon_16x16.png
          sips -z 32 32     assets/logo.png --out app.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/logo.png --out app.iconset/icon_32x32.png
          sips -z 64 64     assets/logo.png --out app.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/logo.png --out app.iconset/icon_128x128.png
          sips -z 256 256   assets/logo.png --out app.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/logo.png --out app.iconset/icon_256x256.png
          sips -z 512 512   assets/logo.png --out app.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/logo.png --out app.iconset/icon_512x512.png
          iconutil -c icns app.iconset -o app.icns
        working-directory: client
      - name: Build erstellen
        run: |
          pyinstaller --onedir --windowed \
            --name="aspm" \
            --icon=app.icns \
            --add-data="assets/*.ui:assets" \
            --hidden-import=PyQt5.sip \
            --hidden-import=PyQt5.uic \
            --osx-bundle-identifier=com.fredima.aspm \
            main.py
      - name: ZIP erstellen
        run: zip -r aspm-mac.zip dist/aspm/
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: client/aspm-mac.zip

  # ─── Windows Build ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Abhängigkeiten installieren
        run: pip install pyinstaller PyQt5
      - name: Build erstellen
        run: |
          pyinstaller --onedir --windowed `
            --name="aspm" `
            --add-data="assets/*.ui;assets" `
            --hidden-import=PyQt5.sip `
            --hidden-import=PyQt5.uic `
            main.py
      - name: Inno Setup installieren & Installer bauen
        run: |
          choco install innosetup -y
          iscc installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: client/installer_output/*.exe

  # ─── GitHub Release & Pages Upload ──────────────────────
  release-and-pages:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      # Artefacts herunterladen
      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: linux-build
      - uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: mac-build
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows-installer

      # GitHub Release erstellen
      - name: Release erstellen
        uses: softprops/action-gh-release@v1
        with:
          files: |
            linux-build/aspm-linux.zip
            mac-build/aspm-mac.zip
            windows-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GitHub Pages Repo klonen
      - uses: actions/checkout@v4
        with:
          repository: fredima2x/fredima2x.github.io
          path: pages-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      # Dateien in Pages-Repo kopieren
      - name: Dateien in Pages-Repo kopieren
        run: |
          mkdir -p pages-repo/downloads/linux-latest
          mkdir -p pages-repo/downloads/macos-latest
          mkdir -p pages-repo/downloads/windows-latest

          cp linux-build/aspm-linux.zip pages-repo/downloads/linux-latest/
          cp mac-build/aspm-mac.zip pages-repo/downloads/macos-latest/
          cp windows-installer/*.exe pages-repo/downloads/windows-latest/

      # Push auf Pages-Repo
      - name: Änderungen pushen
        run: |
          cd pages-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update ASPM Downloads for ${{ github.ref_name }}" || echo "No changes"
          git push
